services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cityflow_db
      POSTGRES_USER: cityflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cityflow123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityflow -d cityflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: cityflow_backend/Dockerfile
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgres://cityflow:${DB_PASSWORD:-cityflow123}@db:5432/cityflow_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn cityflow_backend.wsgi:application
             --bind 0.0.0.0:8000 --workers 2 --timeout 60"

volumes:
  postgres_data:
